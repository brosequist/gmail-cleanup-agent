name: publish-pypi

# Publish to PyPI via Trusted Publishers (OIDC). No API token is stored
# anywhere — PyPI verifies the workflow's identity from the GitHub OIDC
# token at publish time.
#
# One-time setup at https://pypi.org/manage/account/publishing/:
#   PyPI project name: gmail-llm-cleanup
#   Owner:             brosequist
#   Repository name:   gmail-cleanup-agent
#   Workflow filename: release.yml
#   Environment name:  pypi
#
# The PyPI distribution name (`gmail-llm-cleanup`) differs from the
# GitHub repo name (`gmail-cleanup-agent`) because `gmail-cleanup-agent`
# is already taken on PyPI by a different project. The Python import
# (`gmail_cleanup`) and console script (`gmail-cleanup`) are unchanged.
#
# After that, every `git push --tags` of a v* tag publishes to PyPI.

on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      ref:
        description: "Tag or sha to publish (e.g. v1.1.0). Defaults to the workflow's ref."
        required: false
        default: ""

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          # Honor the manual-dispatch ref so re-publishing an existing tag works
          ref: ${{ inputs.ref || github.ref }}

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip

      - name: Build sdist and wheel
        run: |
          python -m pip install --upgrade pip build
          python -m build

      - name: Show built artifacts
        run: ls -lh dist/

      - uses: actions/upload-artifact@v7
        with:
          name: dist
          path: dist/

  publish:
    needs: build
    runs-on: ubuntu-latest
    # Environment binding lets PyPI's Trusted-Publisher rule require it,
    # and gives the repo owner a place to add manual-approval gates later.
    environment:
      name: pypi
      url: https://pypi.org/project/gmail-llm-cleanup/
    permissions:
      id-token: write   # required for OIDC to PyPI
    steps:
      - uses: actions/download-artifact@v8
        with:
          name: dist
          path: dist/

      - uses: pypa/gh-action-pypi-publish@release/v1
