name: publish-docker

# Build and push a multi-arch (amd64 + arm64) image to GHCR on tag push.
# Uses the repository's GITHUB_TOKEN — no manual secret setup needed.
#
# Image is published as:
#   ghcr.io/brosequist/gmail-llm-cleanup:<tag>     (e.g. :v1.1.0)
#   ghcr.io/brosequist/gmail-llm-cleanup:<version> (e.g. :1.1.0)
#   ghcr.io/brosequist/gmail-llm-cleanup:1.1
#   ghcr.io/brosequist/gmail-llm-cleanup:latest    (on default-branch builds)

on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      ref:
        description: "Tag or sha to build (e.g. v1.1.0). Defaults to the workflow's ref."
        required: false
        default: ""

jobs:
  build-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref || github.ref }}

      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/gmail-llm-cleanup
          # See docs/image-tagging.md for the full set; in short:
          #   v1.2.3 -> :v1.2.3, :1.2.3, :1.2, :latest
          tags: |
            type=ref,event=tag
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest,enable=${{ github.ref_type == 'tag' }}

      - uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
